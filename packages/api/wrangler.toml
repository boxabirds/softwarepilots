# Course API Worker - auth, submissions, progress
name = "softwarepilots-api"
main = "src/index.ts"
compatibility_date = "2026-03-09"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[dev]
port = 8790

[vars]
ENVIRONMENT = "local"
EVALUATOR_URL = "http://localhost:8791"
WEB_APP_URL = "http://localhost:3000"

[[d1_databases]]
binding = "DB"
database_name = "softwarepilots-db"
database_id = "local"
migrations_dir = "src/db/migrations"

# Service binding to the Evaluator Worker
[[services]]
binding = "EVALUATOR"
service = "softwarepilots-evaluator"

[env.staging]
name = "softwarepilots-api-staging"
[env.staging.vars]
ENVIRONMENT = "staging"
WEB_APP_URL = "https://softwarepilots-web-staging.pages.dev"

[[env.staging.services]]
binding = "EVALUATOR"
service = "softwarepilots-evaluator-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "softwarepilots-db-staging"
database_id = "bc6f104e-e75b-46d8-8262-0d86ddae5a40"
migrations_dir = "src/db/migrations"

[env.production]
name = "softwarepilots-api"
[env.production.vars]
ENVIRONMENT = "production"
WEB_APP_URL = "https://app.softwarepilotry.com"

[[env.production.services]]
binding = "EVALUATOR"
service = "softwarepilots-evaluator"

[[env.production.d1_databases]]
binding = "DB"
database_name = "softwarepilots-db"
database_id = "10a4195f-40aa-4800-b9f0-c91721d3ac10"
migrations_dir = "src/db/migrations"
